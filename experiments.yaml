# OncoBiome Swarm — Experimentos predefinidos
# Cada experimento define un conjunto de parámetros que sobreescriben settings.py
# Uso: python3 main.py --experiment <nombre>
#      python3 main.py --list-experiments

experiments:

  # ── Baseline y producción ─────────────────────────────────────────────────

  cap80_baseline:
    max_agents: 80
    total_cycles: 77
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Baseline KRAS G12D — cap 80, 77 ciclos (~$0.35)"

  quick_validate:
    max_agents: 150
    total_cycles: 20
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Validación rápida — rule engine, $0, <10 segundos"

  full_rule_engine:
    max_agents: 150
    total_cycles: 77
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Run completa rule engine — $0, ~30 segundos"

  no_immune:
    max_agents: 150
    total_cycles: 30
    n_immune_cells: 0
    n_macrophages: 0
    n_phytochemicals: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Control sin inmunidad — crecimiento tumoral puro ($0)"

  # ── Intervenciones terapéuticas (Sprint 1-3) ─────────────────────────────

  immune_boost:
    max_agents: 150
    total_cycles: 52
    n_immune_cells: 12
    n_macrophages: 6
    n_tumor_cells: 12
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Inmunoterapia simulada — 12 CD8+ + 6 macrófagos (~$0.35)"

  immune_boost_rule:
    max_agents: 150
    total_cycles: 52
    n_immune_cells: 12
    n_macrophages: 6
    n_tumor_cells: 12
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Inmunoterapia simulada — rule engine ($0)"

  combination_therapy:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 6
    n_immune_cells: 10
    n_macrophages: 5
    n_tumor_cells: 12
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Terapia combinada — fitoquímicos + inmunidad (~$0.35)"

  combination_therapy_rule:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 6
    n_immune_cells: 10
    n_macrophages: 5
    n_tumor_cells: 12
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Terapia combinada — rule engine ($0)"

  # ── Sprint 4: controles y experimentos NK/DC ──────────────────────────────

  high_cd8_control_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Control 8 CD8+ sin NK/DC — aísla efecto puro CD8+ ($0)"

  nk_baseline_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK baseline — 4 NK + CD8+ estándar, rule engine ($0)"

  nk_boost_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 8
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK boost — 8 NK terapia adoptiva, rule engine ($0)"

  dc_baseline_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "DC baseline — 3 DC + CD8+ estándar, rule engine ($0)"

  innate_adaptive_bridge_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK + DC bridge — eje innata-adaptativa, rule engine ($0)"

  innate_adaptive_bridge_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "NK + DC bridge LLM — cap=80, ~$0.70/run"

  # ── Sprint 5A: Ablation memoria (COMPLETO n=3) ────────────────────────────
  # Resultado: NK→CD8+ robusto sin memoria (6/6 runs, CV=1.8%)

  ablation_no_memory_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    memory_mode: "null"
    description: "ABLATION memoria — NullMemoryStore, bridge (~$0.70/run)"

  ablation_no_memory_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    memory_mode: "null"
    description: "ABLATION memoria control — rule engine sanity check ($0)"

  ablation_no_memory_baseline_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 0
    opus_analysis_interval: 25
    llm_provider: anthropic
    memory_mode: "null"
    description: "ABLATION memoria baseline — sin NK/DC (~$0.35/run)"

  # ── Sprint 5B: Ablation semántica (H0 vs H1) ─────────────────────────────
  #
  # Hipótesis:
  #   H1 (dinámica emergente real): el patrón NK→CD8+ emerge de topología causal
  #   H0 (plausibilidad narrativa): el patrón emerge del conocimiento biomédico
  #      aprendido por el LLM ("NK cells exhaust early", etc.)
  #
  # Diseño: misma simulación, mismos parámetros, misma topología causal.
  # SOLO cambia el lenguaje: NK→Agent_A, CD8→Agent_B, IFN-γ→Signal_X, etc.
  # La topología causal se preserva explícitamente en los prompts abstractos.
  #
  # Resultado que confirma H1:
  #   Patrón Agent_A→Agent_B persiste con etiquetas abstractas (Δ<3 ciclos vs control)
  # Resultado que confirma H0:
  #   Patrón desaparece o varía >5 ciclos al quitar terminología biomédica
  #
  # Coste estimado: ~$0.70/run (misma configuración que bridge_llm)

  ablation_abstract_semantics_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    prompt_mode: "abstract"   # usa llm/prompts_abstract.py
    description: "ABLATION semántica — etiquetas abstractas (Agent_A/B, Signal_X/Y) (~$0.70/run)"

  ablation_abstract_semantics_no_memory_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    memory_mode: "null"
    prompt_mode: "abstract"   # doble ablation: sin memoria + sin semántica
    description: "ABLATION doble — sin memoria + etiquetas abstractas (~$0.70/run)"

  # ── Sprint 5B: n=10 para Wilcoxon formal ─────────────────────────────────
  #
  # Objetivo: pasar de claims direccionales (n=3) a inferencia estadística formal.
  # n=10 permite Wilcoxon signed-rank con potencia aceptable.
  # Pre-registro de criterio de éxito:
  #   NK precede CD8+ en ≥8/10 runs (P<0.05 binomial exacto bajo H0=0.5)
  #
  # Coste estimado: 10 runs × $0.70 = ~$7 por condición

  bridge_n10_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Bridge n=10 — Wilcoxon formal, criterio ≥8/10 (~$0.70/run)"

  ablation_abstract_n10_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    prompt_mode: "abstract"
    description: "Semántica abstracta n=10 — Wilcoxon vs bridge (~$0.70/run)"
