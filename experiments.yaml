# OncoBiome Swarm — Experimentos predefinidos
# Cada experimento define un conjunto de parámetros que sobreescriben settings.py
# Uso: python3 main.py --experiment <nombre>
#      python3 main.py --list-experiments
#
# NOTA DE COSTE (Sprint 4):
#   Con NK/DC + proliferación tumoral, tokens/ciclo crecen ×3.8 si cap=150.
#   Todos los experimentos LLM con NK/DC usan max_agents=80 para controlar coste.
#   Coste estimado con cap=80: ~$0.18-0.22/run vs ~$0.65+ con cap=150.

experiments:

  # ── Baseline y producción ─────────────────────────────────────────────────

  cap80_baseline:
    max_agents: 80
    total_cycles: 77
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Baseline KRAS G12D — cap 80, 77 ciclos (~$0.35)"

  cap150_batch:
    max_agents: 150
    total_cycles: 52
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Cap 150 con smart batching — 52 ciclos (~$0.35)"

  # ── Validación sin LLM ($0) ───────────────────────────────────────────────

  quick_validate:
    max_agents: 150
    total_cycles: 20
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Validación rápida — rule engine, $0, <10 segundos"

  full_rule_engine:
    max_agents: 150
    total_cycles: 77
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Run completa rule engine — $0, ~30 segundos"

  stress_cap200:
    max_agents: 200
    total_cycles: 30
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Stress test cap 200 — $0"

  # ── Estudios de composición (Sprint 1-3) ─────────────────────────────────

  high_immune:
    max_agents: 150
    total_cycles: 52
    n_immune_cells: 15
    n_tumor_cells: 8
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Inmunidad reforzada — 15 CD8+ vs 8 tumor (~$0.35)"

  no_immune:
    max_agents: 150
    total_cycles: 30
    n_immune_cells: 0
    n_macrophages: 0
    n_phytochemicals: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Control sin inmunidad — crecimiento tumoral puro ($0)"

  # ── Intervenciones terapéuticas (Sprint 1-3) ─────────────────────────────

  phyto_intervention:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 8
    n_immune_cells: 5
    n_tumor_cells: 12
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Intervención fitoquímica — 8 fitoquímicos vs baseline 2 (~$0.35)"

  phyto_intervention_rule:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 8
    n_immune_cells: 5
    n_tumor_cells: 12
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Intervención fitoquímica — rule engine ($0)"

  immune_boost:
    max_agents: 150
    total_cycles: 52
    n_immune_cells: 12
    n_macrophages: 6
    n_tumor_cells: 12
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Inmunoterapia simulada — 12 CD8+ + 6 macrófagos (~$0.35)"

  immune_boost_rule:
    max_agents: 150
    total_cycles: 52
    n_immune_cells: 12
    n_macrophages: 6
    n_tumor_cells: 12
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Inmunoterapia simulada — rule engine ($0)"

  combination_therapy:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 6
    n_immune_cells: 10
    n_macrophages: 5
    n_tumor_cells: 12
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Terapia combinada — fitoquímicos + inmunidad (~$0.35)"

  combination_therapy_rule:
    max_agents: 150
    total_cycles: 52
    n_phytochemicals: 6
    n_immune_cells: 10
    n_macrophages: 5
    n_tumor_cells: 12
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Terapia combinada — rule engine ($0)"

  # ── Sprint 4: controles y experimentos NK/DC ──────────────────────────────

  high_cd8_control_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "Control 8 CD8+ sin NK/DC — aísla efecto puro CD8+, rule engine ($0)"

  nk_baseline_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK baseline — 4 NK + CD8+ estándar, rule engine ($0)"

  nk_boost_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 8
    n_dendritic_cells: 0
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK boost — 8 NK (terapia adoptiva simulada), rule engine ($0)"

  dc_baseline_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "DC baseline — 3 DC + CD8+ estándar, rule engine ($0)"

  innate_adaptive_bridge_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    description: "NK + DC bridge — eje innata-adaptativa, rule engine ($0)"

  innate_adaptive_bridge_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "NK + DC bridge LLM — cap=80, ~$0.20/run"

  full_innate_adaptive_combo:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 4
    n_phytochemicals: 4
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    description: "Full innate+adaptive — NK+DC+CD8+macro+phyto, cap=80 (~$0.25)"

  # ── Sprint 5: Ablation Studies — responde a crítica del revisor ───────────
  #
  # Hipótesis central del revisor: "¿El LLM está modelando biología
  # o simplemente generando comportamiento coherente gracias a la memoria?"
  #
  # Diseño: condición IDÉNTICA al experimento estrella (innate_adaptive_bridge)
  # pero con NullMemoryStore (MEMORY_MODE=null) — agentes sin historia episódica.
  #
  # Interpretación:
  #   - Fenómenos persisten sin memoria → robustos, no dependientes de historia
  #   - Fenómenos desaparecen sin memoria → memoria era el mecanismo real
  #     (igualmente interesante: identifica qué fenómenos son memory-driven)
  #
  # Coste: mismo que bridge_llm (~$0.20-0.70/run según cap)

  ablation_no_memory_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 25
    llm_provider: anthropic
    memory_mode: "null"       # ABLATION: NullMemoryStore, agentes sin historia
    description: "ABLATION — sin memoria episódica, condición bridge (~$0.70/run)"

  # CONTROL ABLATION: misma condición sin memoria, usando rule engine ($0).
  # Valida que el rule engine se comporta igual con/sin memoria (debe ser idéntico,
  # ya que el rule engine no usa memoria — sirve como sanity check del diseño).
  ablation_no_memory_rule:
    max_agents: 150
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 8
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 4
    n_dendritic_cells: 3
    opus_analysis_interval: 999
    llm_provider: rule_engine
    memory_mode: "null"
    description: "ABLATION control — rule engine sin memoria (sanity check, $0)"

  # ABLATION BASELINE: sin NK/DC y sin memoria — aísla el efecto de la memoria
  # en la condición más simple (5 CD8+, configuración Sprint 3).
  ablation_no_memory_baseline_llm:
    max_agents: 80
    total_cycles: 52
    n_tumor_cells: 12
    n_immune_cells: 5
    n_macrophages: 3
    n_phytochemicals: 2
    n_nk_cells: 0
    n_dendritic_cells: 0
    opus_analysis_interval: 25
    llm_provider: anthropic
    memory_mode: "null"
    description: "ABLATION baseline — sin memoria, sin NK/DC (~$0.35/run)"
