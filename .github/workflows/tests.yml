name: OncoBiome Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install test dependencies
      run: pip install pytest==7.4.4 pytest-asyncio==0.23.8

    - name: Create .env
      run: |
        echo "ANTHROPIC_API_KEY=sk-ant-test-placeholder" > .env
        echo "SIMULATION_SEED=42" >> .env

    - name: Collect tests
      run: python -m pytest tests/ --collect-only -q || true

    - name: Run tests
      env:
        ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
        SIMULATION_SEED: "42"
      run: python -m pytest tests/ -v --tb=long

    - name: Validate config
      run: python -c "import yaml; d=yaml.safe_load(open('experiments.yaml')); e=d.get('experiments',d); print('Experiments:', len(e))"
