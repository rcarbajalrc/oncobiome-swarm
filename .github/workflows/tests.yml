name: OncoBiome Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install anthropic pydantic pydantic-settings numpy python-dotenv httpx
        pip install pytest pytest-asyncio pyyaml
        pip install plotly dash
        pip install mem0ai==0.1.29 || echo "mem0ai optional skipped"

    - name: Create .env for tests
      run: |
        echo "ANTHROPIC_API_KEY=sk-ant-test-placeholder" > .env
        echo "SIMULATION_SEED=42" >> .env

    - name: Run tests
      env:
        ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
        SIMULATION_SEED: "42"
      run: |
        python -m pytest tests/ -q --tb=short

    - name: Validate experiments config
      run: python -c "import yaml; data=yaml.safe_load(open('experiments.yaml')); exps=data.get('experiments',data); print(f'Experiments loaded OK: {len(exps)}'); assert len(exps)>=30"
