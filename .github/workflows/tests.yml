name: OncoBiome Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHONPATH: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install anthropic==0.49.0 pydantic==2.10.6 pydantic-settings==2.7.1
        pip install numpy==1.26.4 python-dotenv==1.0.1 httpx==0.28.1 pyyaml==6.0.2
        pip install pytest==7.4.4 pytest-asyncio==0.23.8

    - name: Create .env
      run: |
        echo "ANTHROPIC_API_KEY=sk-ant-test-placeholder" > .env
        echo "SIMULATION_SEED=42" >> .env

    - name: Collect tests (show errors)
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: python -m pytest tests/ --collect-only -q 2>&1 || true

    - name: Run tests
      env:
        ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
        SIMULATION_SEED: "42"
        PYTHONPATH: ${{ github.workspace }}
      run: python -m pytest tests/ -v --tb=long 2>&1

    - name: Validate config
      run: python -c "import yaml; d=yaml.safe_load(open('experiments.yaml')); e=d.get('experiments',d); print('Experiments:', len(e))"
