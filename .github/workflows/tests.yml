name: OncoBiome Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Create .env for tests
      run: |
        echo "ANTHROPIC_API_KEY=sk-ant-test-placeholder" > .env
        echo "SIMULATION_SEED=42" >> .env

    - name: Run tests
      env:
        ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
        SIMULATION_SEED: "42"
      run: |
        python -m pytest tests/ -q --tb=short

    - name: Validate experiments config
      run: |
        python -c "
        from simulation.experiment_loader import load_experiment
        import yaml
        with open('experiments.yaml') as f:
            exps = yaml.safe_load(f)
        print(f'Experiments available: {len(exps)}')
        for name in list(exps.keys())[:3]:
            print(f'  - {name}: OK')
        print('Config validation passed')
        "
