# OncoBiome Swarm — pre-commit hooks
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# These hooks run automatically before every git commit and catch:
#   - API keys and secrets accidentally staged
#   - Trailing whitespace and encoding issues
#   - Python syntax errors

repos:
  # ── Secret detection (CRITICAL — runs first) ─────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            \.env\.example|
            scripts/scan_secrets\.py|
            \.secrets\.baseline
          )$

  # ── General file hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']   # bloquea archivos > 1MB (ej: oncobiome.log)
      - id: no-commit-to-branch
        args: ['--branch', 'main']   # fuerza PR para main

  # ── Python syntax ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast   # Python syntax check
      - id: debug-statements  # detecta print/pdb olvidados
